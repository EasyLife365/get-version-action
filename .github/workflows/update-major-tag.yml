name: Update v1 Tag

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-major-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG='${{ github.event.release.tag_name }}'
          if [[ "$RELEASE_TAG" =~ ^v1\..+ ]]; then
            echo "should_update=true" >> "$GITHUB_OUTPUT"
            echo "✅ Release '$RELEASE_TAG' is in the v1 line. Will move v1."
          else
            echo "should_update=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Release '$RELEASE_TAG' is not a v1.* tag. Skipping v1 update."
          fi

      - name: Checkout
        if: steps.release.outputs.should_update == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move v1 tag to release commit
        if: steps.release.outputs.should_update == 'true'
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG='${{ github.event.release.tag_name }}'
          git fetch --force --tags origin

          TARGET_SHA=$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}" || true)
          if [[ -z "$TARGET_SHA" ]]; then
            echo "❌ Could not resolve commit for release tag '${RELEASE_TAG}'."
            exit 1
          fi

          git tag -f v1 "$TARGET_SHA"
          git push origin refs/tags/v1 --force

          echo "✅ Updated v1 to point to '$TARGET_SHA' from '${RELEASE_TAG}'."
