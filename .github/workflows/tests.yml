name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings 0

      - name: Build
        run: npm run build

      - name: Package action
        run: npm run package

      - name: Ensure dist/index.js is up-to-date
        run: |
          git diff --quiet dist/index.js || (echo "❌ dist/index.js is out of date. Run npm run package and commit changes." && git status && exit 1)

      - name: Unit tests
        run: npm run test

      - name: Runtime smoke test
        run: npm run test:runtime-smoke

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: action-src

      - name: Prepare temporary test repository
        run: |
          git init
          git config user.email integration@test.local
          git config user.name Integration Test
          echo "# Integration test repository" > README.md
          git add README.md
          git commit -m "test: initialize repository"
          git tag v4.5.6

      - name: Run local action
        id: get_version
        uses: ./action-src

      - name: Verify expected outputs
        run: |
          test "${{ steps.get_version.outputs.version }}" = "v4.5.6"
          test "${{ steps.get_version.outputs.versionWithoutV }}" = "4.5.6"
          test "${{ steps.get_version.outputs.major }}" = "4"
          test "${{ steps.get_version.outputs.minor }}" = "5"
          test "${{ steps.get_version.outputs.patch }}" = "6"
