name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (for example: 1.1.2 or v1.1.2)'
        required: true
        type: string
      dry_run:
        description: 'Validate only (no tag or release will be created)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: action-src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: action-src/package-lock.json

      - name: Install dependencies
        working-directory: action-src
        run: npm ci

      - name: Lint
        working-directory: action-src
        run: npm run lint -- --max-warnings 0

      - name: Build
        working-directory: action-src
        run: npm run build

      - name: Package action
        working-directory: action-src
        run: npm run package

      - name: Ensure dist/index.js is up-to-date
        working-directory: action-src
        run: |
          git diff --quiet dist/index.js || (echo "❌ dist/index.js is out of date. Run npm run package and commit changes." && git status && exit 1)

      - name: Unit tests
        working-directory: action-src
        run: npm run test

      - name: Runtime smoke test
        working-directory: action-src
        run: npm run test:runtime-smoke

      - name: Prepare temporary test repository
        run: |
          git init
          git config user.email integration@test.local
          git config user.name Integration Test
          echo "# Integration test repository" > README.md
          git add README.md
          git commit -m "test: initialize repository"
          git tag v4.5.6

      - name: Run local action
        id: get_version
        uses: ./action-src

      - name: Verify expected outputs
        run: |
          test "${{ steps.get_version.outputs.version }}" = "v4.5.6"
          test "${{ steps.get_version.outputs.versionWithoutV }}" = "4.5.6"
          test "${{ steps.get_version.outputs.major }}" = "4"
          test "${{ steps.get_version.outputs.minor }}" = "5"
          test "${{ steps.get_version.outputs.patch }}" = "6"

  create-release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and normalize version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          INPUT_VERSION='${{ github.event.inputs.version }}'
          NORMALIZED_VERSION="${INPUT_VERSION#v}"

          if [[ ! "$NORMALIZED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "❌ Invalid version: '$INPUT_VERSION'"
            echo "Use semantic version format like 1.1.2 or v1.1.2."
            exit 1
          fi

          RELEASE_TAG="v${NORMALIZED_VERSION}"
          echo "✅ Normalized release tag: $RELEASE_TAG"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG='${{ steps.version.outputs.tag }}'
          git fetch --force --tags origin

          if git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            echo "❌ Tag '${RELEASE_TAG}' already exists. Choose a new version."
            exit 1
          fi

          echo "✅ Tag '${RELEASE_TAG}' is available."

      - name: Stop after validation (dry-run)
        if: inputs.dry_run
        run: echo "✅ Dry-run complete. Validation succeeded and no changes were published."

      - name: Create and push tag
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG='${{ steps.version.outputs.tag }}'
          TARGET_SHA='${{ github.sha }}'

          git tag "$RELEASE_TAG" "$TARGET_SHA"
          git push origin "refs/tags/$RELEASE_TAG"

          echo "✅ Pushed tag '$RELEASE_TAG' at commit '$TARGET_SHA'."

      - name: Publish GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.version.outputs.tag }}'
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              target_commitish: context.sha,
              generate_release_notes: true,
              draft: false,
              prerelease: tag.includes('-')
            })

            core.info(`✅ Published release ${tag}`)
