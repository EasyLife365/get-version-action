name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (for example: 1.1.2 or v1.1.2)'
        required: true
        type: string
      dry_run:
        description: 'Validate only (no tag or release will be created)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and normalize version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          INPUT_VERSION='${{ github.event.inputs.version }}'
          NORMALIZED_VERSION="${INPUT_VERSION#v}"

          if [[ ! "$NORMALIZED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "❌ Invalid version: '$INPUT_VERSION'"
            echo "Use semantic version format like 1.1.2 or v1.1.2."
            exit 1
          fi

          RELEASE_TAG="v${NORMALIZED_VERSION}"
          echo "✅ Normalized release tag: $RELEASE_TAG"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG='${{ steps.version.outputs.tag }}'
          git fetch --force --tags origin

          if git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            echo "❌ Tag '${RELEASE_TAG}' already exists. Choose a new version."
            exit 1
          fi

          echo "✅ Tag '${RELEASE_TAG}' is available."

      - name: Stop after validation (dry-run)
        if: inputs.dry_run
        run: echo "✅ Dry-run complete. Validation succeeded and no changes were published."

      - name: Create and push tag
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG='${{ steps.version.outputs.tag }}'
          TARGET_SHA='${{ github.sha }}'

          git tag "$RELEASE_TAG" "$TARGET_SHA"
          git push origin "refs/tags/$RELEASE_TAG"

          echo "✅ Pushed tag '$RELEASE_TAG' at commit '$TARGET_SHA'."

      - name: Publish GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.version.outputs.tag }}'
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              target_commitish: context.sha,
              generate_release_notes: true,
              draft: false,
              prerelease: tag.includes('-')
            })

            core.info(`✅ Published release ${tag}`)
